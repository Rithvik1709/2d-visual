<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        a {
            display: block;
            padding: 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s;
        }
        a:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>You can browse the web from inside the 3D room</p>
        <div class="links">
            <a href="https://www.wikipedia.org" target="_top">Wikipedia</a>
            <a href="https://www.duckduckgo.com" target="_top">DuckDuckGo</a>
            <a href="https://www.github.com" target="_top">GitHub</a>
            <a href="https://www.reddit.com" target="_top">Reddit</a>
        </div>
    </div>
</body>
</html>
